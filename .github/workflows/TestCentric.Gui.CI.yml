name: TestCentric.GuiRunner.CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  ContinuousIntegration:
    name: TestCentric Continuous Integration
    runs-on: windows-latest

    env:
        TESTCENTRIC_MYGET_API_KEY: ${{ secrets.TESTCENTRIC_MYGET_API_KEY }}
        TESTCENTRIC_NUGET_API_KEY: ${{ secrets.TESTCENTRIC_NUGET_API_KEY }}
        TESTCENTRIC_CHOCO_API_KEY: ${{ secrets.TESTCENTRIC_CHOCO_API_KEY }}
        GITHUB_ACCESS_TOKEN: ${{ secrets.TESTCENTRIC_GITHUB_ACCESS_TOKEN }}

    # If you need to get more verbose logging from any of the cake script
    # executions below, add the option --verbosity=diagnostic to the command.

    steps:
      - name: ⤵️ Checkout Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: |
            3.1.x
            6.0.x 
            7.0.x
            8.0.100
  
      - name: 🔧 Install dotnet tools
        run: dotnet tool restore

      - name: 🍰 Build, Test and Package
        run: dotnet cake --target=Test --target=Package --configuration=Release

